name: Pipeline con Acción JS

on:
  push:
    branches: ["main"]

jobs:
  ejecutar-accion:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar acción reutilizable
        uses: ./.github/actions/js-action
        with:
          nombre: "Oscar"